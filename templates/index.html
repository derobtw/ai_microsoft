<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local RAG Assistant</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="page-shell">
        <section class="hero">
            <div class="badge">
                <span class="tile blue"></span>
                <span class="tile green"></span>
                <span class="tile yellow"></span>
                <span class="tile red"></span>
                Microsoft Foundry Local RAG
            </div>

            <h1>Ask your documents. Locally.</h1>

            <p>
                Upload PDF, DOCX, or TXT files. The assistant indexes them into
                a local SQLite database and answers using only retrieved passages.
            </p>
        </section>

        <section class="workspace">
            <section class="panel">
                <div class="section-header">
                    <div>
                        <p class="eyebrow">Step 1</p>
                        <h2>Upload and index</h2>
                    </div>
                    <button id="resetButton" class="ghost-button">Reset</button>
                </div>

                <label class="drop-zone" for="fileInput">
                    <input id="fileInput" type="file" multiple accept=".pdf,.docx,.txt">
                    <span class="upload-mark">+</span>
                    <strong>Choose documents</strong>
                    <small>PDF, DOCX, and TXT files are supported</small>
                </label>

                <button id="uploadButton" class="primary-button">Upload and index</button>
                <div id="uploadStatus" class="status">No files indexed yet.</div>
            </section>

            <section class="panel">
                <div class="section-header">
                    <div>
                        <p class="eyebrow">Step 2</p>
                        <h2>Ask a question</h2>
                    </div>
                    <button id="statusButton" class="ghost-button">Status</button>
                </div>

                <textarea id="questionInput" placeholder="Example: Who is the instructor?"></textarea>

                <button id="askButton" class="primary-button">Ask assistant</button>

                <div id="answerArea" class="answer hidden">
                    <p class="eyebrow">Answer</p>
                    <div id="answerText"></div>
                </div>

                <div id="sourcesArea" class="sources hidden">
                    <p class="eyebrow">Sources</p>
                    <ul id="sourcesList"></ul>
                </div>
            </section>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
